services:
  - type: web
    name: uhi-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: ALLOWED_ORIGINS
        value: "http://localhost:5173,https://YOUR_VERCEL_DOMAIN.vercel.app"
